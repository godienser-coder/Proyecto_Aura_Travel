<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/reserva.css">
    <title>Mis Reservas - Aura Travel</title>
</head>
<body>
    <div class="page-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="brand-block">
                    <span class="brand-name">Aura</span>
                    <span class="brand-tag">Travel</span>
                </div>
            </div>
            <div class="sidebar-card">
                <p class="sidebar-title">CLIENTE</p>
                <p id="userName" class="sidebar-user"></p>
            </div>
            <nav class="sidebar-menu">
                <a href="/page/reservas.html" class="active">Mis Reservas</a>
                <a href="/page/nueva-reserva.html">Nueva Reserva</a>
            </nav>
            <div class="sidebar-footer">
                <p>Control total de tus experiencias.</p>
                <button id="logoutBtn" class="btn btn-outline">Cerrar Sesión</button>
            </div>
        </aside>

        <main class="page-content">
            <button id="sidebarToggle" class="sidebar-toggle" aria-label="Abrir menú">
                <span></span>
            </button>
            <header class="page-header">
                <div>
                    <p class="eyebrow">Cliente · Reservas</p>
                    <h1>Mis Reservas</h1>
                </div>
                <a href="/page/nueva-reserva.html" class="btn">+ Nueva Reserva</a>
            </header>

            <div id="reservationsList"></div>
            <div id="reservationDetails" class="modal-overlay" style="display:none;">
                <div class="modal-content reservation-details-modal" id="reservationDetailsContent"></div>
            </div>

            <!-- MODAL EDITAR -->
            <div id="editModal" class="modal-overlay" style="display:none;">
                <div class="modal-content">
                    <h2>Editar Reserva</h2>
                    <form id="editReservationForm" class="form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="editIDHabitacion">Habitación:</label>
                                <select id="editIDHabitacion" required>
                                    <option value="">Seleccione una habitación</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="editIDPaquete">Paquete:</label>
                                <select id="editIDPaquete" required>
                                    <option value="">Seleccione un paquete</option>
                                </select>
                            </div>
                            <div class="form-group full-width">
                                <label>Servicios Adicionales:</label>
                                <div id="editServiciosContainer"></div>
                            </div>
                            <div class="form-group">
                                <label for="editFechaInicio">Fecha de Inicio:</label>
                                <input type="date" id="editFechaInicio" required>
                            </div>
                            <div class="form-group">
                                <label for="editFechaFinalizacion">Fecha de Finalización:</label>
                                <input type="date" id="editFechaFinalizacion" required>
                            </div>
                            <div class="form-group">
                                <label for="editMetodoPago">Método de Pago:</label>
                                <select id="editMetodoPago" required>
                                    <option value="">Seleccione método de pago</option>
                                </select>
                            </div>
                        </div>

                        <div class="resumen" id="editResumen">
                            <h3>Resumen de Pago</h3>
                            <p>Subtotal: <span id="editSubtotal">$0</span></p>
                            <p>IVA (19%): <span id="editIva">$0</span></p>
                            <p class="total-row"><strong>Total:</strong> <span id="editTotal">$0</span></p>
                        </div>

                        <input type="hidden" id="editIdReserva">
                        <div class="actions-row">
                            <button type="button" class="btn" onclick="guardarEdicion()">Guardar</button>
                            <button type="button" class="btn btn-outline" onclick="cerrarModal()">Cancelar</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/reservas.js"></script>
</body>
</html>
